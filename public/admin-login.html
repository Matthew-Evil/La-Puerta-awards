<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для админов | La Puerta Awards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0A0A0A;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 165, 0, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 80% 20%, rgba(255, 165, 0, 0.05) 0%, transparent 20%);
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-box {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 40px;
            border: 2px solid #FFA500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #FFA500;
            font-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            color: #FFB733;
        }
        
        .login-title {
            color: #FFA500;
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            text-align: left;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #CCCCCC;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            padding: 14px;
            background: #2A2A2A;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #FFA500;
            box-shadow: 0 0 0 3px rgba(255, 165, 0, 0.1);
        }
        
        .login-btn {
            background: linear-gradient(45deg, #FFA500, #FFB733);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .login-btn:hover {
            background: linear-gradient(45deg, #FFB733, #FFA500);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 165, 0, 0.3);
        }
        
        .error-message {
            color: #FF4444;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        
        .creator-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #888;
            font-size: 0.9rem;
        }
        
        .creator-info p {
            margin: 5px 0;
        }
        
        .creator-info strong {
            color: #FFA500;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <button class="back-btn" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Назад
        </button>
        
        <div class="login-box">
            <h2 class="login-title">🥁 ВХОД ДЛЯ АДМИНОВ</h2>
            
            <form class="login-form" id="adminLoginForm">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-input" id="username" placeholder="Введите логин" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" placeholder="Введите пароль" required>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> ВОЙТИ
                </button>
                
                <div id="loginError" class="error-message"></div>
            </form>
            
            <div class="creator-info">
                <p><strong>Создатель сайта:</strong></p>
                <p>👑 Логин: <strong>Matthew_Evil</strong></p>
                <p>🔑 Пароль: <strong>FGTcEq5Dlvmv</strong></p>
                <p style="margin-top: 15px; color: #666; font-size: 0.8rem;">
                    Этот доступ только для создателя сайта.<br>
                    Обычные админы добавляются через панель управления.
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // Проверяем, подключен ли Font Awesome
        if (!document.querySelector('link[href*="font-awesome"]')) {
            const faLink = document.createElement('link');
            faLink.rel = 'stylesheet';
            faLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
            document.head.appendChild(faLink);
        }
        
        // Обработка формы входа
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('loginError');
            
            // Проверяем учетные данные создателя
            if (username === 'Matthew_Evil' && password === 'FGTcEq5Dlvmv') {
                errorElement.textContent = '';
                errorElement.style.color = '#44FF44';
                errorElement.textContent = '✅ Вход успешен! Перенаправляем...';
                
                // Сохраняем в localStorage (временное решение)
                localStorage.setItem('adminAuth', 'true');
                localStorage.setItem('adminUser', 'Matthew_Evil');
                localStorage.setItem('adminRole', 'owner');
                
                // Перенаправляем в админ-панель
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                errorElement.textContent = '❌ Неверный логин или пароль';
                errorElement.style.color = '#FF4444';
                
                // Анимация ошибки
                const inputs = document.querySelectorAll('.form-input');
                inputs.forEach(input => {
                    input.style.borderColor = '#FF4444';
                    setTimeout(() => {
                        input.style.borderColor = '#333';
                    }, 1000);
                });
            }
        });
        
        // Проверка нажатия Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement.type !== 'textarea') {
                document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // Фокус на поле ввода логина при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
